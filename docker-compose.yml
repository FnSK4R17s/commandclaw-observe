services:
  # --- Langfuse (tracing) ---
  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@postgres:5432/langfuse
      - NEXTAUTH_SECRET=commandclaw-local-secret
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=commandclaw-local-salt
      # Auto-seed org, project, and API keys on first boot
      - LANGFUSE_INIT_ORG_ID=commandclaw
      - LANGFUSE_INIT_ORG_NAME=CommandClaw
      - LANGFUSE_INIT_PROJECT_ID=commandclaw
      - LANGFUSE_INIT_PROJECT_NAME=CommandClaw
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=pk-lf-local
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=sk-lf-local
      - LANGFUSE_INIT_USER_EMAIL=admin@commandclaw.dev
      - LANGFUSE_INIT_USER_NAME=admin
      - LANGFUSE_INIT_USER_PASSWORD=admin
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/public/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- Postgres (backing store for Langfuse) ---
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 3s
      timeout: 2s
      retries: 5
    restart: unless-stopped

  # --- Prometheus (metrics) ---
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  # --- Grafana (dashboards) ---
  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafdata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  promdata:
  grafdata:
