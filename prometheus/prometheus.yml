global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # CommandClaw MCP Gateway (when running)
  # The gateway exposes Prometheus metrics at /metrics
  - job_name: "mcp-gateway"
    static_configs:
      - targets: ["host.docker.internal:8100"]
    metrics_path: /metrics
    scrape_interval: 10s
